<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrión - Ejercicios JavaScript</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Tu CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Ejercicios JavaScript - Carrión
        </h1>

        <!-- EJERCICIO 1 -->
        <div class="card p-4 mb-4 shadow">

            <h2>Doble de un número</h2>

            <input type="number"
            id="numeroDoble"
            class="form-control my-3"
            placeholder="Ingrese un número">

            <button class="btn btn-primary"
            onclick="calcularDoble()">
                Calcular Doble
            </button>

            <button class="btn btn-success ms-3"
            onclick="limpiarDoble()">
                Limpiar
            </button>

            <p id="resultadoDoble" class="mt-3"></p>

        </div>

        <!-- EJERCICIO 2 -->
        <div class="card p-4 mb-4 shadow">

            <h2>Número Palíndromo</h2>

            <input type="text"
            id="numeroPalindromo"
            class="form-control my-3"
            placeholder="Ingrese un número">

            <button class="btn btn-success"
            onclick="verificarPalindromo()">
                Verificar Palíndromo
            </button>

            <button class="btn btn-danger ms-4"
            onclick="limpiarPalindromo()">
                Limpiar
            </button>

            <p id="resultadoPalindromo" class="mt-3"></p>

        </div>

        <!-- EJERCICIO 3 -->
        <div class="card p-4 mb-4 shadow">

            <h2>Contador Automático</h2>

            <button class="btn btn-warning"
            onclick="incrementarContador()">
                Incrementar Contador
            </button>

            <button class="btn btn-info ms-2"
            onclick="reiniciarContador()">
                Reiniciar Contador
            </button>

            <h3 id="contador" class="mt-3">0</h3>

        </div>

        <!-- EJERCICIO 4 -->
        <div class="card p-4 mb-4 shadow">

            <h2>Lista de Tareas</h2>

            <input type="text"
            id="tarea"
            class="form-control my-3"
            placeholder="Ingrese una tarea">

            <button class="btn btn-dark"
            onclick="agregarTarea()">

                Agregar Tarea

            </button>

            <button class="btn btn-primary ms-1"
            onclick="borrarTarea()">
                Borrar Tarea

            </button>

            <ul id="listaTareas" class="mt-4 list-group"></ul>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="scripts/functions.js"></script>

</body>

</html>
